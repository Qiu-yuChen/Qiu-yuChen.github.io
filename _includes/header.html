<header class="header">

  <!-- Dual Logos — fixed at top of sidebar -->
  <div class="header_logos">
    <a href="{{ '/' | relative_url }}" class="logo_link">
      <img src="{{ '/assets/img/cqy.png' | relative_url }}" alt="Qiuyu Chen" class="logo_personal">
    </a>
    <a href="{{ '/about-kailab.html' | relative_url }}" class="logo_link">
      <img src="{{ '/assets/img/kailab.png' | relative_url }}" alt="KAI Lab" class="logo_lab">
    </a>
  </div>

  <!-- Theme toggle — top-right corner -->
  <label class="theme_changer">
    <input theme_toggle type="checkbox">
    <div class="button"></div>
  </label>

  <div class="header_content">

    <a class="header_circle" href="{{ '/' | relative_url }}">
      <img src="{{ site.user.pic | relative_url }}" alt="{{ site.user.picAlt }}">
    </a>
    <span class="header_name">{{ site.user.name }}</span>
    <span class="header_job">{{ site.user.job }}</span>
    <span class="header_mes">{{ site.user.message }}</span>

    <!-- Social / Contact links -->
